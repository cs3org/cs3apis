syntax = "proto3";

package cs3.identity.tenant.v1beta1;

import "cs3/types/v1beta1/types.proto";

option csharp_namespace = "Cs3.Identity.Tenant.V1Beta1";
option go_package = "tenantv1beta1";
option java_multiple_files = true;
option java_outer_classname = "ResourcesProto";
option java_package = "com.cs3.identity.tenant.v1beta1";
option objc_class_prefix = "CIT";
option php_namespace = "Cs3\\Identity\\Tenant\\V1Beta1";

// A Tenant represents an isolated organization. Users can be member of
// exactly one tenant. Members of different tenants are unable to access
// each others resources.
message Tenant {
  // REQUIRED.
  // The unique identifier of the tenant. This is a UUID
  string id = 1;
  // OPTIONAL
  // The name of the Tenant
  string name = 2;
  // OPTIONAL
  // An external identifier to able to lookup Tenants by externally managed IDs
  string external_id = 3;
}

