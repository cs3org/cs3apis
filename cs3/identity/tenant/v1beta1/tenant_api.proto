syntax = "proto3";

package cs3.identity.tenant.v1beta1;

import "cs3/identity/tenant/v1beta1/resources.proto";
import "cs3/rpc/v1beta1/status.proto";
import "cs3/types/v1beta1/types.proto";

option csharp_namespace = "Cs3.Identity.User.V1Beta1";
option go_package = "userv1beta1";
option java_multiple_files = true;
option java_outer_classname = "UserApiProto";
option java_package = "com.cs3.identity.user.v1beta1";
option objc_class_prefix = "CIU";
option php_namespace = "Cs3\\Identity\\User\\V1Beta1";

// TenantProvider API.
//
// The TenantProvider API is responsible for providing
// methods to retrieve information about Tenants.
//
// The key words "MUST", "MUST NOT", "REQUIRED", "SHALL", "SHALL
// NOT", "SHOULD", "SHOULD NOT", "RECOMMENDED",  "MAY", and
// "OPTIONAL" in this document are to be interpreted as described in
// RFC 2119.
//
// The following are global requirements that apply to all methods:
// Any method MUST return CODE_OK on a successful operation.
// Any method MAY return NOT_IMPLEMENTED.
// Any method MAY return INTERNAL.
// Any method MAY return UNKNOWN.
// Any method MAY return UNAUTHENTICATED.

// Provides an API for managing users.
service TenantAPI {
  // Gets the information about a Tenant by the tenant id.
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
  // Gets the information about a Tenant based on a specified claim.
  rpc GetTenantByClaim(GetTenantByClaimRequest) returns (GetTenantByClaimResponse);
}

message GetTenantRequest {
  // REQUIRED.
  // The id of the tenant.
  string tenant_id = 1;
}

message GetTenantResponse {
  // REQUIRED.
  // The response status.
  cs3.rpc.v1beta1.Status status = 1;
  // REQUIRED.
  // The tenant information.
  cs3.identity.tenant.v1beta1.Tenant tenant = 2;
}

message GetTenantByClaimRequest {
  // REQUIRED.
  // The claim on the basis of which users will be filtered.
  string claim = 1;
  // REQUIRED.
  // The value of the claim to find the specific user.
  string value = 2;
}

message GetTenantByClaimResponse {
  // REQUIRED.
  // The response status.
  cs3.rpc.v1beta1.Status status = 1;
  // REQUIRED.
  // The tenant information.
  cs3.identity.tenant.v1beta1.Tenant tenant = 2;
}
